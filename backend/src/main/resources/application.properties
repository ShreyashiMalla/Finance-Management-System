spring.application.name=finance-app
server.port=8080

# ===== Use H2 (no install needed) for quick start =====
spring.datasource.url=jdbc:h2:file:./data/financedb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# ===== To switch to MySQL, comment H2 lines above and uncomment below =====
#spring.datasource.url=jdbc:mysql://localhost:3306/financedb?createDatabaseIfNotExist=true
#spring.datasource.username=root
#spring.datasource.password=yourpassword
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.jwt.secret=ZmluYW5jZS1hcHAtc3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtbWUtaW4tcHJvZA==
app.jwt.expiration-ms=86400000
